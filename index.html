<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <nav class="navbar">
            <div class="logo">TODO+</div>
            <div class="nav-buttons">
                <button id="menuBtn" class="press-effect">☰</button>
            </div>
        </nav>
        
        <div id="menuDropdown">
            <div id="listTabs"></div>
            <button id="addListBtn" class="press-effect">+ Neue Liste</button>
        </div>

        <div class="app">
            <h1 id="listTitle">Meine Liste</h1>
            <div class="input-area">
                <input type="text" id="todoInput" placeholder="Aufgabe hinzufügen..." autocomplete="off">
                <button id="addBtn" class="press-effect">Hinzufügen</button>
            </div>
            <div id="autocompleteList" class="autocomplete-list"></div>

            <div class="filters">
                <button class="filter-btn press-effect" data-filter="all">Alle</button>
                <button class="filter-btn press-effect" data-filter="offen">Offen</button>
                <button class="filter-btn press-effect" data-filter="erledigt">Erledigt</button>
            </div>

            <div id="counter">0 von 0 erledigt</div>
            <ul id="todoList"></ul>
        </div>

        <footer>
            Abschlussprojekt 2026 Beigans Daniel | HTBLA Traun
        </footer>
    </div>

    <!-- Modal für neue Liste -->
    <div id="addListModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Neue Liste</h2>
                <button id="closeModalBtn" class="modal-close">✕</button>
            </div>
            <input type="text" id="listNameInput" placeholder="Listenname">
            <div class="list-type-selector">
                <span>✓ Listentyp</span>
                <select id="listTypeSelect">
                    <option value="todo">Todo-Liste</option>
                    <option value="shopping">Einkaufsliste</option>
                </select>
            </div>
            <div class="color-label">Button-Farbe:</div>
            <div class="color-options">
                <div class="color-circle" data-color="#ff3b30" style="background: #ff3b30;"></div>
                <div class="color-circle" data-color="#ff9500" style="background: #ff9500;"></div>
                <div class="color-circle" data-color="#ffcc00" style="background: #ffcc00;"></div>
                <div class="color-circle" data-color="#34c759" style="background: #34c759;"></div>
                <div class="color-circle" data-color="#007aff" style="background: #007aff;"></div>
                <div class="color-circle selected" data-color="#0a84ff" style="background: #0a84ff;"></div>
                <div class="color-circle" data-color="#5856d6" style="background: #5856d6;"></div>
                <div class="color-circle" data-color="#af52de" style="background: #af52de;"></div>
            </div>
            <button id="confirmAddListBtn" class="press-effect">Erstellen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
