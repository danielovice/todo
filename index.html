<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Todo Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0f0f0f; color:white; }
.container { max-width:600px; margin:auto; padding:20px; }
.card { background:#1c1c1e; padding:20px; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.5);} 
input { width:100%; padding:12px; margin:6px 0; border-radius:10px; border:none; background:#2c2c2e; color:white; }
button { padding:12px; border:none; border-radius:10px; background:#0a84ff; color:white; cursor:pointer; }
.row { display:flex; gap:10px; }
ul { list-style:none; padding:0; }
li { background:#2c2c2e; margin:5px 0; padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; }
.done { text-decoration: line-through; opacity:0.6; }
.hidden { display:none; }
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">
<div class="row">
<button onclick="register()">Registrieren</button>
<button onclick="loginEmail()">Login</button>
</div>
<button onclick="loginGoogle()">Google</button>
<button onclick="loginApple()">Apple</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="card">
<h2 id="title">Meine Liste</h2>
<div class="row">
<input id="todoInput" placeholder="Neues Todo">
<button onclick="addTodo()">+</button>
</div>

<div class="row">
<button onclick="setFilter(null)">Alle</button>
<button onclick="setFilter('open')">Offen</button>
<button onclick="setFilter('done')">Erledigt</button>
</div>

<ul id="list"></ul>

<p id="counter"></p>

<button onclick="logout()">Logout</button>
</div>
</div>

</div>

<script>
// 🔥 CONFIG EINSETZEN
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_DOMAIN",
  projectId: "DEIN_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let todos = [];
let filter = null;

// AUTH
function register(){ auth.createUserWithEmailAndPassword(email.value, password.value); }
function loginEmail(){ auth.signInWithEmailAndPassword(email.value, password.value); }
function loginGoogle(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function loginApple(){ auth.signInWithPopup(new firebase.auth.OAuthProvider('apple.com')); }
function logout(){ auth.signOut(); }

// STATE

auth.onAuthStateChanged(user=>{
  if(user){
    userId = user.uid;
    login.classList.add('hidden');
    app.classList.remove('hidden');
    loadTodos();
  } else {
    login.classList.remove('hidden');
    app.classList.add('hidden');
  }
});

// TODOS
function addTodo(){
  const text = todoInput.value.trim();
  if(!text) return;
  todos.push({text, done:false});
  saveTodos();
  todoInput.value='';
}

function toggle(i){
  todos[i].done = !todos[i].done;
  saveTodos();
}

function del(i){
  todos.splice(i,1);
  saveTodos();
}

function saveTodos(){
  db.collection('users').doc(userId).set({todos});
}

function loadTodos(){
  db.collection('users').doc(userId)
    .onSnapshot(doc=>{
      todos = doc.data()?.todos || [];
      render();
    });
}

function setFilter(f){ filter=f; render(); }

function render(){
  list.innerHTML='';

  let filtered = todos;
  if(filter==='open') filtered = todos.filter(t=>!t.done);
  if(filter==='done') filtered = todos.filter(t=>t.done);

  filtered.forEach((t,i)=>{
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="${t.done?'done':''}" onclick="toggle(${i})">${t.text}</span>
      <button onclick="del(${i})">X</button>
    `;
    list.appendChild(li);
  });

  const done = todos.filter(t=>t.done).length;
  counter.textContent = `${done} von ${todos.length} erledigt`;
}
</script>

</body>
</html>
