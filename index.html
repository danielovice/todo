<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">

  <!-- Titel der Seite -->
  <title>Abschlussprojekt</title>

  <!-- CSS Datei einbinden -->
  <link rel="stylesheet" href="CSS/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="pics/Screenshot 2026-03-12 185322.png">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">

    <!-- Logo links -->
    <div class="logo">TODO</div>

    <!-- Rechts: Buttons + Menü -->
    <div class="nav-buttons">

      <!-- Button zum Erstellen einer neuen Liste -->
      <button id="addListBtn">+</button>

      <!-- Menü Container -->
      <div class="menu">

        <!-- Button zu mehreren Listen -->
        <button id="menuBtn">☰</button>

        <!-- Dropdown Menü -->
        <div id="menuDropdown">
          <!-- Hier werden die Listen dynamisch eingefügt -->
          <div id="listTabs"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- APP Container -->
  <div class="app">

    <!-- Titel der aktuellen Liste -->
    <h1 id="listTitle">Meine Liste</h1>

    <!-- Eingabebereich für Todos -->
    <div class="input-area">

      <!-- Textfeld für neues Todo -->
      <input id="todoInput" type="text" placeholder="Neues Todo...">

      <!-- Button zum Hinzufügen -->
      <button id="addBtn">Hinzufügen</button>

    </div>

    <!-- Filter Buttons -->
    <div class="filters">
      <button class="filter-btn" data-filter="offen">Offen</button>
      <button class="filter-btn" data-filter="erledigt">Erledigt</button>
    </div>

    <!-- Anzeige: wie viele Todos erledigt -->
    <p id="counter">0 von 0 erledigt</p>

    <!-- Liste der Todos -->
    <ul id="todoList"></ul>

  </div>

  <!-- Footer -->
  <footer>
    Abschlussprojekt 2026 Beigans Daniel <br>
    HTBLA Traun
  </footer>

  <!-- JavaScript Datei -->
  <script src="JavaScript/script.js"></script>

</body>

</html>
