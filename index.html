<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Abschlussprojekt</title>

<link rel="stylesheet" href="CSS/style.css">
<link rel="icon" type="image/png" href="pics/Screenshot 2026-03-12 185322.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

</head>

<body>

<div class="navbar">

<div class="logo">TODO</div>

<div class="nav-buttons">

<button id="addListBtn">+</button>

<div class="menu">

<button id="menuBtn">☰</button>

<div id="menuDropdown">
<div id="listTabs"></div>
</div>

</div>
</div>
</div>

<div class="app">

<h1 id="listTitle">Meine Liste</h1>

<div class="input-area">

<input id="todoInput" type="text" placeholder="Neues Todo...">

<button id="addBtn">Hinzufügen</button>

</div>

<div class="filters">
<button class="filter-btn" data-filter="offen">Offen</button>
<button class="filter-btn" data-filter="erledigt">Erledigt</button>
</div>

<p id="counter">0 von 0 erledigt</p>

<ul id="todoList"></ul>

</div>

<footer>
Abschlussprojekt 2026 Beigans Daniel <br>
HTBLA Traun
</footer>

<script src="JavaScript/script.js"></script>

  <div id="addListModal" class="modal">
    <div class="modal-content">
        <h2>Neue Liste erstellen</h2>
        <label for="listNameInput">Name der Liste:</label>
        <input type="text" id="listNameInput" placeholder="Meine Liste">

        <label>Art der Liste:</label>
        <select id="listTypeSelect">
            <option value="todo">Normale Todo</option>
            <option value="shopping">Einkaufsliste</option>
        </select>

        <label>Button-Farbe:</label>
        <div class="color-options">
            <div class="color-circle" data-color="#0a84ff" style="background:#0a84ff;"></div>
            <div class="color-circle" data-color="#30d158" style="background:#30d158;"></div>
            <div class="color-circle" data-color="#ff9500" style="background:#ff9500;"></div>
            <div class="color-circle" data-color="#bf5af2" style="background:#bf5af2;"></div>
        </div>

        <button id="confirmAddListBtn">OK</button>
    </div>
</div>

</body>
</html>
